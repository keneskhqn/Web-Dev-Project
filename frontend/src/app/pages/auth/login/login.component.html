<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="paw">🐾</span>
      <h1>PawMatch</h1>
      <p class="tagline">Найди своего пушистого друга</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <div class="input-wrapper">
          <span class="input-icon">🐱</span>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="username"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>
      </div>

      @if (errorMsg) {
        <div class="error-banner">{{ errorMsg }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        @if (isLoading) {
          <span class="spinner"></span> Входим...
        } @else {
          Войти 🐾
        }
      </button>
    </form>

    <p class="auth-link">
      Нет аккаунта? <a routerLink="/register">Зарегистрироваться</a>
    </p>
  </div>
</div>
